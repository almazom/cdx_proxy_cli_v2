observed_gaps:
  - id: MK-GAP-001
    observation: "satisfaction_percent=89% is structurally below threshold in analysis_only mode when P0/P1 items are unimplemented. The scoring formula penalizes unimplemented findings even though analysis_only cannot implement them."
    severity: medium
    mutation_proposal: >
      For analysis_only mode, use confidence_percent as the primary exit gate.
      Add a secondary score: analysis_satisfaction = confidence - unresolved_P0*1 - unresolved_P1*0.5
      (reduced weights since analysis_only is explicitly not implementing).
      Or: split pilot_score into analysis_score and implementation_score.

  - id: MK-GAP-002
    observation: "Waggle burst record required but burst was not triggered (agreement=1.0). The artifact exists but is a null record. This is correct behavior but the contract requires the artifact regardless."
    severity: low
    mutation_proposal: >
      Consider making recruitment_burst_review.yaml conditional on trigger firing.
      Add explicit 'not_triggered' status to reduce artifact noise when all analyses agree.

  - id: MK-GAP-003
    observation: "gate_input_materialization started with future gates marked materialized=false and was updated inline. In a multi-agent true parallel scenario this would be a race condition."
    severity: low
    mutation_proposal: >
      Emit gate_input_materialization as immutable phase-by-phase records rather than a single mutable YAML.
      Each gate emits gate_input_materialization_phase_N.yaml when its inputs are ready.

  - id: MK-GAP-004
    observation: "The flow has 34 mandatory core artifacts. Some are low-information in analysis_only mode (e.g., implementation_report.yaml is a one-line attestation). Artifact bloat risk."
    severity: medium
    mutation_proposal: >
      Add mode-aware artifact sets:
      - analysis_only_required: [subset of 34]
      - implementation_required: [full set]
      This reduces noise and makes audit easier.

  - id: MK-GAP-005
    observation: "No log files were written to logs/ directory. The flow spec lists logs/ as a required subfolder but no logging contract specifies what goes there."
    severity: low
    mutation_proposal: >
      Add a LOGGING_CONTRACT to the flow spec defining:
      - logs/phase_trace.log: timestamped phase transitions
      - logs/agent_outputs.log: raw variation outputs before synthesis
      This makes the logs/ folder useful for debugging.

  - id: MK-GAP-006
    observation: "E14 (control gate parallel density >=3 agents) is technically met with strategy_variations but the spirit of the rule (distinct engines) is not met in single-executor runs. The compliance is formal, not substantive."
    severity: medium
    mutation_proposal: >
      Add to E14 an explicit single-executor exception path:
      - if distinct_engines < 3: strategy_variations_count >= 3 satisfies the gate
      - document this as a formal compliance path (not a workaround)
      Currently this is implied but not stated explicitly in the contract.

